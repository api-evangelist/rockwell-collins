naftiko: "1.0.0-alpha1"

info:
  label: "FlightAware AeroAPI"
  description: >-
    FlightAware AeroAPI provides real-time and historical flight data access
    including flight tracking, airport information, operator fleet data,
    configurable alerts, and Foresight ML-based predictive ETAs.
  tags:
    - Aviation
    - Flight Tracking
    - Aerospace
    - REST
    - Real-Time Data
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      FLIGHTAWARE_API_KEY: FLIGHTAWARE_API_KEY

capability:
  consumes:
    - type: http
      namespace: aeroapi
      baseUri: https://aeroapi.flightaware.com/aeroapi
      description: "FlightAware AeroAPI for aviation data access"
      authentication:
        type: apikey
        key: x-apikey
        value: "{{FLIGHTAWARE_API_KEY}}"
        placement: header
      resources:
        - name: flights
          path: /flights
          description: "Flight search, tracking, and information"
          operations:
            - name: search-flights
              method: GET
              description: "Search for airborne flights matching various parameters"
              inputParameters:
                - name: query
                  in: query
                  type: string
                  required: false
                  description: "Simplified query string with key-value pairs"
                - name: max_pages
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of result pages"
                - name: cursor
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: search-flights-advanced
              method: GET
              description: "Search for flights using advanced query syntax"
              inputParameters:
                - name: query
                  in: query
                  type: string
                  required: false
                  description: "Advanced query string"
                - name: max_pages
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of result pages"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-flight
              method: GET
              description: "Get information for a specific flight"
              inputParameters:
                - name: ident
                  in: path
                  type: string
                  required: true
                  description: "Flight identifier (ICAO or IATA)"
                - name: max_pages
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of result pages"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-flight-position
              method: GET
              description: "Get the current position of a flight"
              inputParameters:
                - name: fa_flight_id
                  in: path
                  type: string
                  required: true
                  description: "FlightAware flight ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-flight-track
              method: GET
              description: "Get the position track of a flight"
              inputParameters:
                - name: fa_flight_id
                  in: path
                  type: string
                  required: true
                  description: "FlightAware flight ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-flight-route
              method: GET
              description: "Get the filed route of a flight"
              inputParameters:
                - name: fa_flight_id
                  in: path
                  type: string
                  required: true
                  description: "FlightAware flight ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: airports
          path: /airports
          description: "Airport information and activity"
          operations:
            - name: get-all-airports
              method: GET
              description: "Get a list of all airports"
              inputParameters:
                - name: max_pages
                  in: query
                  type: integer
                  required: false
                  description: "Maximum result pages"
                - name: cursor
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-airport
              method: GET
              description: "Get static information about an airport"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Airport code (ICAO or IATA)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-airport-delays
              method: GET
              description: "Get delay information for an airport"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Airport code"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-airport-flights
              method: GET
              description: "Get all flights for a given airport"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Airport code"
                - name: max_pages
                  in: query
                  type: integer
                  required: false
                  description: "Maximum result pages"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-airport-weather
              method: GET
              description: "Get current weather conditions for an airport"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Airport code"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: operators
          path: /operators
          description: "Airline and operator information and fleet activity"
          operations:
            - name: get-all-operators
              method: GET
              description: "Get a list of all operators"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-operator
              method: GET
              description: "Get information about a specific operator"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Operator ICAO code"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-operator-flights
              method: GET
              description: "Get flights for a specific operator"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Operator ICAO code"
                - name: max_pages
                  in: query
                  type: integer
                  required: false
                  description: "Maximum result pages"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: alerts
          path: /alerts
          description: "Configure real-time flight event alerts"
          operations:
            - name: get-all-alerts
              method: GET
              description: "Get all configured alerts for the account"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-alert
              method: POST
              description: "Create a new flight alert configuration"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  ident: "{{tools.ident}}"
                  events: "{{tools.events}}"

            - name: update-alert
              method: PUT
              description: "Update an existing alert configuration"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "Alert ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: delete-alert
              method: DELETE
              description: "Delete a flight alert"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "Alert ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: aeroapi-rest
      resources:
        - path: /v1/flights
          name: flights
          description: "Flight tracking and information"
          operations:
            - method: GET
              name: search-flights
              description: "Search for flights"
              call: "aeroapi.search-flights"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/airports
          name: airports
          description: "Airport information"
          operations:
            - method: GET
              name: list-airports
              description: "List airports"
              call: "aeroapi.get-all-airports"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: aeroapi-mcp
      transport: http
      tools:
        - name: search-flights
          description: "Search for airborne flights by various criteria"
          hints:
            readOnly: true
            openWorld: true
          call: "aeroapi.search-flights"
          with:
            query: "tools.query"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-flight
          description: "Get detailed information for a specific flight by identifier"
          hints:
            readOnly: true
            openWorld: false
          call: "aeroapi.get-flight"
          with:
            ident: "tools.ident"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-airport
          description: "Get information about an airport by ICAO or IATA code"
          hints:
            readOnly: true
            openWorld: false
          call: "aeroapi.get-airport"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
